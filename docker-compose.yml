version: '3.8'

services:
  db:
    image: postgres:13
    container_name: bitnews-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - bitnews-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build: .
    container_name: bitnews-web
    command: ["./comash.sh"]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - bitnews-network
    env_file:
      - .env

networks:
  bitnews-network:
    driver: bridge

volumes:
  postgres-data:
